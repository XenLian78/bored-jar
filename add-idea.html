<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Bored Jar - Πρόσθεσε Ιδέα</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container">
        
        <div class="top-nav nav-right">
            <a href="jar-view.html">Παράλειψη ></a>
        </div>

        <div class="main-card add-idea-card">
            <h2 class="card-title">
                ΓΡΑΨΕ ΜΙΑ ΙΔΕΑ ΚΑΙ<br>ΤΟΠΟΘΕΤΗΣΕ ΤΗΝ ΣΤΟ ΒΑΖΟ
            </h2>
            <p class="card-subtitle">Επανέλαβε για περισσότερες ιδέες</p>

            <input type="text" id="ideaInput" placeholder="Γράψε μια ιδέα..." class="custom-input">

            <button class="start-btn" id="addBtn">Βάλε την ιδέα στο βάζο</button>

            <button class="start-btn btn-orange" onclick="window.location.href='jar-view.html'">
                Δες το βάζο σου
            </button>

            <img src="assets/images/idea-man.png" class="bottom-char-img" alt="Idea Character">
        </div>

        <footer class="app-footer">
            <img src="assets/images/logo-bored-jar.svg" class="footer-logo" alt="Bored Jar Logo">
        </footer>
    </div>

    <script>
        const input = document.getElementById('ideaInput');
        const btn = document.getElementById('addBtn');

        btn.addEventListener('click', () => {
            const newIdea = input.value.trim();
            
            if (newIdea !== "") {
                let savedIdeas = JSON.parse(localStorage.getItem('myIdeas')) || [];
                savedIdeas.push(newIdea);
                localStorage.setItem('myIdeas', JSON.stringify(savedIdeas));
                
                alert("Η ιδέα '" + newIdea + "' μπήκε στο βάζο!");
                input.value = "";
            } else {
                alert("Γράψε κάτι πρώτα!");
            }
        });
    </script>

</body>
</html>
