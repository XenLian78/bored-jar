<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Bored Jar - Πρόσθεσε Ιδέα</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container">
        
<div class="top-nav" style="text-align: right;">
    <a href="jar-view.html">Παράλειψη ></a>
</div>

        
<div class="main-card">
    <<img src="assets/images/idea-man.png" class="bottom-char-img" alt="Idea Character">
</div>
            <h2 style="color: var(--dark-text); font-size: 20px; margin-bottom: 10px; text-transform: uppercase;">
                ΓΡΑΨΕ ΜΙΑ ΙΔΕΑ ΚΑΙ<br>ΤΟΠΟΘΕΤΗΣΕ ΤΗΝ ΣΤΟ ΒΑΖΟ
            </h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 25px;">Επανέλαβε για περισσότερες ιδέες</p>

            
<input type="text" id="ideaInput" placeholder="Γράψε μια ιδέα..." 
                   style="width: 100%; padding: 15px; border: 2px solid #E0E0E0; border-radius: 15px; margin-bottom: 20px; font-size: 16px;">

            
<button class="start-btn" id="addBtn" style="margin-top: 0;">Βάλε την ιδέα στο βάζο</button>

            
<button class="start-btn btn-orange" 
                    onclick="window.location.href='jar-view.html'" 
                    style="margin-top: 15px;">
                Δες το βάζο σου
            </button>

            
<img src="assets/images/idea-man.png" class="bottom-char-img" alt="Idea Character">
        </div>

        
<footer style="text-align: center; padding: 10px 15px 25px 15px; margin-top: auto;">
            <img src="assets/images/logo-bored-jar.svg" style="width: 80px;" alt="Bored Jar Logo">
        </footer>
    </div>

    <script>
        const input = document.getElementById('ideaInput');
        const btn = document.getElementById('addBtn');

        btn.addEventListener('click', () => {
            const newIdea = input.value.trim();
            
            if (newIdea !== "") {
                let savedIdeas = JSON.parse(localStorage.getItem('myIdeas')) || [];
                savedIdeas.push(newIdea);
                localStorage.setItem('myIdeas', JSON.stringify(savedIdeas));
                
                alert("Η ιδέα '" + newIdea + "' μπήκε στο βάζο!");
                input.value = "";
            } else {
                alert("Γράψε κάτι πρώτα!");
            }
        });
    </script>

</body>
</html>
