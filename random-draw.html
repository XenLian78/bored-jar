<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Bored Jar - Κλήρωση!</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Διόρθωση μεγεθών για να μην "εκρήγνυται" το βάζο */
        .draw-area {
            position: relative;
            width: 100%;
            flex-grow: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 320px;
            margin-top: 20px;
        }

        .jar-wrapper { 
            position: relative; 
            width: 180px; /* Σταθερό πλάτος */
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #jarBody { 
            width: 100%; 
            height: auto;
            display: block; 
            position: absolute;
            bottom: 0;
            z-index: 1;
        }

        #jarLid {
            position: absolute;
            width: 102%; 
            top: 25px; /* Προσαρμογή για να "κουμπώσει" στο σώμα */
            left: -1%; 
            z-index: 2;
            height: auto;
            transition: transform 0.3s ease-out;
        }
        
        /* Το συννεφάκι */
        #cloudContainer {
            position: absolute;
            top: -40px;
            width: 300px;
            height: auto;
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #cloudImg { width: 100%; }

        #selectedIdea {
            position: absolute;
            z-index: 11;
            padding: 30px;
            font-weight: bold;
            color: #1D2D50;
            font-size: 18px;
            text-align: center;
            width: 85%;
        }

        /* Animations */
        .shaking { animation: shake 0.5s infinite; }
        .lid-off { transform: translateY(-150px) rotate(25deg) !important; opacity: 0; }
        .cloud-active { display: flex !important; animation: cloudShow 0.5s forwards; }

        @keyframes cloudShow {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .main-card {
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="top-nav">
            <a href="jar-view.html">< Πίσω</a>
        </div>

        <div class="main-card">
            <div class="draw-area">
                <div id="cloudContainer">
                    <img src="assets/images/cloud-bubble.png" id="cloudImg">
                    <div id="selectedIdea"></div>
                </div>

                <div class="jar-wrapper" id="fullJar">
                    <img src="assets/images/jar-lid.png" id="jarLid">
                    <img src="assets/images/jar-body.png" id="jarBody">
                </div>
            </div>

            <div id="actionButtons" style="width: 100%; padding: 0 10px;">
                <button class="start-btn btn-orange" onclick="drawIdea()">ΔΙΑΛΕΞΕ ΓΙΑ ΜΕΝΑ</button>
            </div>
            
            <div id="resultButtons" style="width: 100%; display: none; flex-direction: column; gap: 12px; padding: 0 10px;">
                <button class="start-btn" onclick="doneIdea()" style="background-color: #28a745; margin-top: 0;">ΤΟ ΕΚΑΝΑ!</button>
                <button class="start-btn" onclick="location.reload()" style="background-color: var(--btn-gray); margin-top: 0;">ΑΛΛΟ ΕΝΑ...</button>
            </div>
        </div>

        <footer style="text-align: center; padding: 15px;">
            <img src="assets/images/logo-bored-jar.svg" style="width: 80px;">
        </footer>
    </div>

    <script>
        let currentIdeaIndex = -1;
        let savedIdeas = JSON.parse(localStorage.getItem('myIdeas')) || [];
        
        function drawIdea() {
            if (savedIdeas.length === 0) {
                alert("Το βάζο είναι άδειο!");
                return;
            }

            const jar = document.getElementById('fullJar');
            const lid = document.getElementById('jarLid');
            const cloud = document.getElementById('cloudContainer');
            const ideaText = document.getElementById('selectedIdea');

            jar.classList.add('shaking');
            
            setTimeout(() => {
                jar.classList.remove('shaking');
                lid.classList.add('lid-off');

                const randomIndex = Math.floor(Math.random() * savedIdeas.length);
                const choice = savedIdeas[randomIndex];
                currentIdeaIndex = randomIndex;
                
                ideaText.innerText = choice;

                setTimeout(() => {
                    cloud.classList.add('cloud-active');
                    document.getElementById('actionButtons').style.display = 'none';
                    document.getElementById('resultButtons').style.display = 'flex';
                }, 400);

            }, 1000);
        }

        function doneIdea() {
            if (currentIdeaIndex > -1) {
                savedIdeas.splice(currentIdeaIndex, 1);
                localStorage.setItem('myIdeas', JSON.stringify(savedIdeas));
                window.location.href = 'jar-view.html';
            }
        }
    </script>
</body>
</html>
