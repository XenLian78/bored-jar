<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Βάζο Αντι-βαρεμάρας</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container">
        <header class="app-header-main" style="text-align: center; margin-top: 35px; margin-bottom: 25px;">
            <h1 class="main-title" style="color: var(--dark-text); font-size: 24px; line-height: 1.2;">
                Καλωσήρθες στο<br>Βάζο Αντι-βαρεμάρας
            </h1>
        </header>

        <div class="main-card index-card" style="display: flex; flex-direction: column; flex-grow: 1;">
            
            <div class="categories-grid">
                <div class="cat"><img src="assets/images/explore-icon.png"><p>Εξερεύνησε</p></div>
                <div class="cat"><img src="assets/images/create-icon.png"><p>Δημιούργησε</p></div>
                <div class="cat"><img src="assets/images/learn-icon.png"><p>Μάθε</p></div>
                <div class="cat"><img src="assets/images/help-icon.png"><p>Βοήθα</p></div>
                <div class="cat"><img src="assets/images/play-icon.png"><p>Παίξε</p></div>
                <div class="cat"><img src="assets/images/relax-icon.png"><p>Χαλάρωσε</p></div>
            </div>

            <div class="hero-image-container" style="width: 100%; margin-top: 10px;">
                <img src="assets/images/main_characters.png" class="hero-img" style="width: 100%; display: block;">
            </div>

            <button class="start-btn btn-bottom no-bold" onclick="window.location.href='add-idea.html'">ΞΕΚΙΝΑΜΕ</button>
        </div>

        <footer class="app-footer">
            <img src="assets/images/logo-bored-jar.svg" class="footer-logo" alt="Bored Jar Logo">
        </footer>
    </div>

</body>
</html>
