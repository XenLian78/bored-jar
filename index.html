
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Bored Jar - Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container">
        <header style="text-align: center; margin-top: 30px;">
            <h1 style="color: var(--dark-text); font-size: 28px; text-decoration: underline;">
                Welcome to<br>Bored Jar
            </h1>
        </header>

        <div style="background: var(--white-card); border-radius: 30px; margin-top: 20px; flex-grow: 1; padding: 20px; display: flex; flex-direction: column; align-items: center;">
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%;">
                <div class="cat"><img src="assets/images/explore.png" width="100%"><p>Explore</p></div>
                <div class="cat"><img src="assets/images/create.png" width="100%"><p>Create</p></div>
                <div class="cat"><img src="assets/images/learn.png" width="100%"><p>Learn</p></div>
                <div class="cat"><img src="assets/images/help.png" width="100%"><p>Help</p></div>
                <div class="cat"><img src="assets/images/play.png" width="100%"><p>Play</p></div>
                <div class="cat"><img src="assets/images/relax.png" width="100%"><p>Relax</p></div>
            </div>

            <div style="margin-top: auto; width: 100%;">
                <img src="assets/images/main_characters.png" style="width: 100%; display: block;">
            </div>
        </div>
        <footer style="text-align: center; padding: 15px;">
    <img src="assets/images/logo-bored-jar.svg" style="width: 80px;" alt="Bored Jar Logo">
</footer>
    </div>

</body>
</html>
