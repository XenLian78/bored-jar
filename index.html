<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Βάζο Αντι-βαρεμάρας</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-container">
        <header style="text-align: center; margin-top: 30px;">
            <h1 style="color: var(--dark-text); font-size: 24px; text-decoration: underline;">
                Καλωσήρθες στο<br>Βάζο Αντι-βαρεμάρας
            </h1>
        </header>

        <div class="main-card">
            <div class="categories-grid">
                <div class="cat"><img src="assets/images/explore-icon.png"><p>Εξερεύνησε</p></div>
                <div class="cat"><img src="assets/images/create-icon.png"><p>Δημιούργησε</p></div>
                <div class="cat"><img src="assets/images/learn-icon.png"><p>Μάθε</p></div>
                <div class="cat"><img src="assets/images/help-icon.png"><p>Βοήθα</p></div>
                <div class="cat"><img src="assets/images/play-icon.png"><p>Παίξε</p></div>
                <div class="cat"><img src="assets/images/relax-icon.png"><p>Χαλάρωσε</p></div>
            </div>

            <button class="start-btn">ΞΕΚΙΝΑΜΕ</button>

            <div style="margin-top: auto; width: 100%;">
                <img src="assets/images/main_characters.png" style="width: 100%; display: block;">
            </div>
        </div>

        <footer style="text-align: center; padding: 15px;">
            <img src="assets/images/logo-bored-jar.svg" style="width: 80px;" alt="Bored Jar Logo">
        </footer>
    </div>

</body>
</html>
